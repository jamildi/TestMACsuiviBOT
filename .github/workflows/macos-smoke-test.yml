name: macOS Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - "shopify_pdf_bot_platform.py"
      - "requirements_shopify_pdf_bot.txt"
      - "packaging/macos/**"
      - "scripts/build_macos_bundle.ps1"
      - ".github/workflows/macos-smoke-test.yml"

jobs:
  smoke-test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle structure
        shell: pwsh
        run: ./scripts/build_macos_bundle.ps1

      - name: Verify bundle structure
        shell: bash
        run: |
          echo "=== Bundle structure ==="
          find "02 - App Mac/BOT Suivi Shopify.app" -type f | head -20
          echo ""
          echo "=== Launcher shebang ==="
          head -3 "02 - App Mac/BOT Suivi Shopify.app/Contents/MacOS/bot-suivi-shopify"
          echo ""
          echo "=== Checking for CRLF ==="
          if grep -Pl '\r' "02 - App Mac/BOT Suivi Shopify.app/Contents/MacOS/bot-suivi-shopify"; then
            echo "ERROR: CRLF detected in launcher!"
            exit 1
          else
            echo "OK: LF only"
          fi

      - name: Test bash syntax
        shell: bash
        run: bash -n "02 - App Mac/BOT Suivi Shopify.app/Contents/MacOS/bot-suivi-shopify"

      - name: Test Python syntax
        shell: bash
        run: python3 -m py_compile "02 - App Mac/BOT Suivi Shopify.app/Contents/Resources/payload/shopify_pdf_bot_platform.py"

      - name: Launch app bootstrap
        shell: bash
        run: |
          chmod +x "02 - App Mac/BOT Suivi Shopify.app/Contents/MacOS/bot-suivi-shopify"
          BOT_NO_OPEN=1 CI=true "02 - App Mac/BOT Suivi Shopify.app/Contents/MacOS/bot-suivi-shopify" > launcher.log 2>&1 &
          echo $! > launcher.pid
          echo "Launcher PID: $(cat launcher.pid)"

      - name: Wait for local server
        shell: bash
        run: |
          for i in $(seq 1 180); do
            if curl -fsS "http://127.0.0.1:5010/" > /dev/null 2>&1; then
              echo "Server OK after ${i}s"
              break
            fi
            if [ "$i" -eq 180 ]; then
              echo "TIMEOUT: server did not start in 180s"
              exit 1
            fi
            sleep 1
          done

      - name: Verify server response
        shell: bash
        run: |
          BODY=$(curl -fsS "http://127.0.0.1:5010/")
          echo "$BODY" | grep -q "BOT Suivi Shopify" && echo "Homepage OK" || { echo "Homepage check FAILED"; exit 1; }
          echo "$BODY" | grep -q "v2.0.0" && echo "Version OK" || { echo "Version check FAILED"; exit 1; }

          # Test logs endpoint
          curl -fsS "http://127.0.0.1:5010/logs" > /dev/null && echo "Logs endpoint OK" || { echo "Logs endpoint FAILED"; exit 1; }

          echo "All checks passed!"

      - name: Show launcher log
        if: always()
        shell: bash
        run: |
          echo "=== Launcher log ==="
          cat launcher.log 2>/dev/null || echo "(no launcher log)"
          echo ""
          echo "=== Setup log ==="
          cat "$HOME/Library/Application Support/BOT Suivi Shopify/logs/setup.log" 2>/dev/null || echo "(no setup log)"
          echo ""
          echo "=== Server log ==="
          cat "$HOME/Library/Application Support/BOT Suivi Shopify/logs/server.log" 2>/dev/null || echo "(no server log)"

      - name: Stop launcher
        if: always()
        shell: bash
        run: |
          if [[ -f launcher.pid ]]; then
            kill "$(cat launcher.pid)" 2>/dev/null || true
          fi
          pkill -f "shopify_pdf_bot_platform.py" 2>/dev/null || true
